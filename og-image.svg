<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Cardinal Studio — Not an agency. A player.">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14171F"/>
      <stop offset="100%" stop-color="#1F3A93"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Oversized # watermark in bottom-right -->
  <text x="1100" y="660"
        text-anchor="end"
        font-family="Bricolage Grotesque, ui-sans-serif, system-ui, sans-serif"
        font-size="600"
        font-weight="800"
        fill="#D62828"
        opacity="0.15"
        letter-spacing="-30">#</text>

  <!-- Eyebrow -->
  <text x="80" y="180"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="22"
        font-weight="600"
        fill="#F4B41A"
        letter-spacing="3"
        text-transform="uppercase">CARDINAL STUDIO</text>

  <!-- Main brand statement -->
  <text x="80" y="320"
        font-family="Bricolage Grotesque, ui-sans-serif, system-ui, sans-serif"
        font-size="100"
        font-weight="800"
        fill="#F4EBD0"
        letter-spacing="-3">Not an agency.</text>
  <text x="80" y="430"
        font-family="Bricolage Grotesque, ui-sans-serif, system-ui, sans-serif"
        font-size="100"
        font-weight="800"
        fill="#F4EBD0"
        letter-spacing="-3">A player.</text>

  <!-- Tagline -->
  <text x="80" y="540"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="28"
        font-weight="500"
        fill="#F4EBD0"
        opacity="0.8">Brand sites for brands worth being a fan of.</text>
</svg>
